<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET2Print Edge AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;">
    
    <div class="container" style="max-width: 600px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; height: 100%;">
        
        <div>
            <h2 style="margin-top: 5px; margin-bottom: 10px;">PET2Print Optik Sensör</h2>
            <div class="status-panel" style="background-color: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333;">
                <p style="margin: 5px 0;">Hedef: 1.75 mm</p>
                <p style="margin: 5px 0; font-size: 22px;">Anlık: <span id="kalinlik-deger" style="color:#00E676; font-weight:bold;">0.00 mm</span></p>
                <p style="margin: 5px 0; font-size: 14px;">MQTT Durumu: <span id="mqtt-durum" style="color: #ff5252;">Bağlanıyor...</span></p>
            </div>
        </div>
        
        <div class="video-container" style="flex-grow: 1; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; min-height: 200px;">
            <video id="kamera" autoplay playsinline style="display: none;"></video>
            <canvas id="islemEkrani" style="max-width: 100%; max-height: 45vh; object-fit: contain; border: 2px solid #00E676; border-radius: 8px; background-color: #000; box-shadow: 0 4px 15px rgba(0,230,118,0.2);"></canvas>
        </div>
        
        <div style="padding-bottom: 15px;">
            <button id="baslatBtn" style="width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background-color: #00E676; color: black; border-radius: 8px; border: none; cursor: pointer;">Sistemi Başlat (Kamera + Yapay Zeka)</button>
            
            <div class="kamera-kontrolleri" style="margin-top: 10px; display: none; gap: 10px; justify-content: center;" id="ekstraKontroller">
                <select id="kameraSecici" style="padding: 10px; border-radius: 8px; flex-grow: 1; background-color: #333; color: white; border: 1px solid #00E676;"></select>
                <button id="flasBtn" style="padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; background-color: #FFC107; color: black; cursor: pointer;">Flaş Aç</button>
            </div>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    <script src="app.js"></script>
</body>
</html>
