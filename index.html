<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET2Print Edge AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>PET2Print Optik Sensör</h2>
        <div class="status-panel">
            <p>Hedef: 1.75 mm</p>
            <p>Anlık: <span id="kalinlik-deger">0.00 mm</span></p>
            <p>MQTT Durumu: <span id="mqtt-durum" class="disconnected">Bağlanıyor...</span></p>
        </div>
        
        <button id="baslatBtn" style="width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background-color: #00E676; color: black; border-radius: 8px; border: none;">Sistemi Başlat (Kamera + Yapay Zeka)</button>
        
        <div class="video-container" style="margin-top: 20px;">
            <video id="kamera" autoplay playsinline style="display: none;"></video>
            <canvas id="islemEkrani" style="width: 100%; border: 2px solid #00E676; border-radius: 8px; background-color: #000;"></canvas>
        </div>
        
        <div class="kamera-kontrolleri" style="margin-top: 15px; display: none; gap: 10px; justify-content: center;" id="ekstraKontroller">
            <select id="kameraSecici" style="padding: 10px; border-radius: 8px; flex-grow: 1; background-color: #333; color: white; border: 1px solid #00E676;"></select>
            <button id="flasBtn" style="padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; background-color: #FFC107; color: black;">Flaş Aç</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    <script src="app.js"></script>
</body>
</html>
