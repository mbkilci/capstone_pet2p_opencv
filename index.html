<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET2Print Edge AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>PET2Print Optik Sensör</h2>
        <div class="status-panel">
            <p>Hedef: 1.75 mm</p>
            <p>Anlık: <span id="kalinlik-deger">0.00 mm</span></p>
            <p>MQTT Durumu: <span id="mqtt-durum" class="disconnected">Bağlanıyor...</span></p>
        </div>
        
        <button id="baslatBtn">Sistemi Başlat (Kamera + Yapay Zeka)</button>
        
        <div class="video-container">
            <video id="kamera" autoplay playsinline></video>
            <canvas id="islemEkrani"></canvas>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    <script src="app.js"></script>
</body>
</html>
